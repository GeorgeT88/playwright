name: E2E Tests
run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && 'E2E Tests — manual run' ||
      github.event_name == 'repository_dispatch' && 'E2E Tests — triggered by Vercel deploy' ||
      github.event_name == 'schedule' && 'E2E Tests — nightly run' ||
      'E2E Tests' }}

on:
  repository_dispatch:
    types: [vercel-deploy]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: write

jobs:
  test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the Playwright test repository
        uses: actions/checkout@v4

      - name: Set up Node.js runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Download Chromium browser for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run all 30 E2E tests against manuelaklenke.com
        run: npx playwright test --project=chromium

      - name: Write test results summary
        if: always()
        run: |
          echo "## Playwright E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** https://manuelaklenke.com" >> $GITHUB_STEP_SUMMARY
          echo "**Browser:** Chromium" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View full HTML report](https://georget88.github.io/playwright/)" >> $GITHUB_STEP_SUMMARY

      - name: Publish HTML test report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: .
